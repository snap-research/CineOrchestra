# Conda environment for the CineBenchSyn metric pipeline.
#
#   conda env create -f environment.yml
#   conda activate cinebenchsyn
#
# Notes:
#   - The pinned torch wheel targets CUDA 12.x. On a different CUDA version,
#     install the matching torch build from https://pytorch.org/get-started.
#   - transformers must be recent enough to provide Sam2VideoModel and
#     Qwen2.5-VL (the pinned version is known-good).
#   - All models (Grounding DINO, SAM 2, DINOv2, CLIP, ViCLIP, Qwen2.5-VL)
#     download automatically from the HuggingFace Hub / OpenAI on first run.
name: cinebenchsyn
channels:
  - conda-forge
dependencies:
  - python=3.12
  - ffmpeg
  - pip
  - pip:
      - torch==2.7.1
      - torchvision
      - transformers==5.2.0
      - qwen-vl-utils
      - huggingface_hub
      - safetensors
      - fvcore
      - opencv-python
      - numpy
      - pillow
      - tqdm
      - ftfy
      - regex
      - git+https://github.com/openai/CLIP.git
